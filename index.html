<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DiagramEngine — a modular, professional diagram creation tool with drag-and-drop shape library" />
  <title>DiagramEngine — Diagram Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- CSS modules — load in dependency order -->
  <link rel="stylesheet" href="css/shapes-panel.css" />
  <link rel="stylesheet" href="css/shapes-panel-header.css" />
  <link rel="stylesheet" href="css/shape-category-list.css" />
  <link rel="stylesheet" href="css/shape-library-items.css" />
  <link rel="stylesheet" href="css/shapes-panel-splitter.css" />
  <link rel="stylesheet" href="css/shapes-search.css" />
</head>
<body>
  <div id="app-root">

    <!-- ── Top Toolbar ─────────────────────────────────── -->
    <header id="app-toolbar">
      <div class="toolbar-brand">
        <svg class="brand-icon" width="26" height="26" viewBox="0 0 26 26" fill="none" aria-hidden="true">
          <rect x="2"  y="2"  width="10" height="10" rx="2.5" fill="#6366f1"/>
          <rect x="14" y="2"  width="10" height="10" rx="2.5" fill="#8b5cf6"/>
          <rect x="2"  y="14" width="10" height="10" rx="2.5" fill="#a78bfa"/>
          <rect x="14" y="14" width="10" height="10" rx="2.5" fill="#c4b5fd" opacity="0.7"/>
        </svg>
        <span class="brand-name">DiagramEngine</span>
        <span class="brand-badge">M1</span>
      </div>

      <nav class="toolbar-center" aria-label="Diagram tools">
        <button class="toolbar-btn" id="btn-undo" title="Undo">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 5l3-3-3-3M2 5h5a5 5 0 010 10H4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-redo" title="Redo">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M12 5l-3-3 3-3M12 5H7a5 5 0 000 10h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="toolbar-sep"></div>
        <button class="toolbar-btn" id="btn-zoom-out" title="Zoom out">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M4 6h4M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-zoom-in" title="Zoom in">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M6 4v4M4 6h4M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
        <div class="toolbar-sep"></div>
        <button class="toolbar-btn toolbar-btn--active" id="btn-select" title="Select tool">Select</button>
        <button class="toolbar-btn" id="btn-connect" title="Connector tool">Connect</button>
      </nav>

      <nav class="toolbar-actions" aria-label="File actions">
        <button class="toolbar-btn" id="btn-new">New</button>
        <button class="toolbar-btn" id="btn-open">Open</button>
        <button class="toolbar-btn" id="btn-save">Save</button>
        <button class="toolbar-btn toolbar-btn--primary" id="btn-export">Export</button>
      </nav>
    </header>

    <!-- ── Main Workspace ──────────────────────────────── -->
    <main id="app-workspace">

      <!-- Shapes Panel will be rendered here by JS -->
      <div id="shapes-panel-mount" aria-label="Shapes panel region" role="region"></div>

      <!-- Diagram Canvas -->
      <div id="DiagramCanvas" style="position: relative; overflow: hidden;" aria-label="Diagram canvas" role="main">
        <div id="canvas-empty-state">
          <svg width="72" height="72" viewBox="0 0 72 72" fill="none" aria-hidden="true">
            <rect x="6" y="6" width="60" height="60" rx="10" stroke="#2a3146" stroke-width="2" stroke-dasharray="7 5"/>
            <path d="M36 24v24M24 36h24" stroke="#2a3146" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <h2>Start building your diagram</h2>
          <p>Drag shapes from the panel on the left to place them here</p>
          <span class="canvas-hint">← Shape Library · Drag &amp; Drop</span>
        </div>
        <!-- Drop zone indicator shown during drag -->
        <div id="canvas-drop-indicator" class="hidden" aria-hidden="true"></div>
      </div>

    </main>

    <!-- ── Drag Ghost Preview ───────────────────────────── -->
    <div id="drag-preview-ghost" class="hidden" aria-hidden="true"></div>

    <!-- ── Status Bar ──────────────────────────────────── -->
    <footer id="app-status-bar">
      <span id="status-message">Ready</span>
      <span id="status-active-category" aria-live="polite"></span>
      <span id="status-canvas-info">Canvas · 100%</span>
    </footer>

  </div>

  <!-- ═══════════════════════════════════════════════════
       JavaScript modules — loaded in strict dependency order
       ═══════════════════════════════════════════════════ -->
  <!-- Phase 1.1 — State -->
  <script src="js/shapes-panel-state.js"></script>
  <!-- Phase 1.2 — Data layer -->
  <script src="js/shape-categories.js"></script>
  <!-- Phase 1.3 — Drag payload builder -->
  <script src="js/shape-library-drag-payload.js"></script>
  <!-- Phase 1.2 — Item loading -->
  <script src="js/load-shape-library-items.js"></script>
  <!-- Phase 1.2 — Item rendering (depends on drag) -->
  <script src="js/drag-shape-library-item.js"></script>
  <script src="js/render-shape-library-items.js"></script>
  <!-- Phase 1.2 — Category selection -->
  <script src="js/select-shape-category.js"></script>
  <!-- Phase 1.3 — Search + Splitter -->
  <script src="js/shapes-search.js"></script>
  <script src="js/shapes-panel-splitter.js"></script>
  <!-- Phase 1.1 — Toggle -->
  <script src="js/toggle-shapes-panel.js"></script>
  <!-- Orchestrator — loaded last -->
  <script src="js/render-shapes-panel.js"></script>
  
  <!-- Phase 7 — Protection Padding & Containment -->
  <script src="js/child-rectangle-protection-padding.js"></script>
  <script src="js/child-rectangle-container-clamp.js"></script>
  <!-- Phase 2 — Canvas Interaction & Collisions -->
  <script src="js/diagram-canvas-collision.js"></script>
  <script src="js/diagram-canvas.js"></script>

</body>
</html>
